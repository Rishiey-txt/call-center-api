version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - chroma_data:/app/chroma_db

  worker:
    build: .
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - chroma_data:/app/chroma_db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: callcenter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  chroma_data:
